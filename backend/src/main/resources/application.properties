# 应用服务 WEB 访问端口
server.port=8080

# MySQL 数据库配置
spring.datasource.url=jdbc:mysql://mysql:3306/teach?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
spring.datasource.username=teach
spring.datasource.password=5m7XHpKCZPxSta82
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# HikariCP 连接池配置
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.validation-timeout=5000
# 避免 MySQL 主动关闭空闲连接后被连接池复用导致告警（应小于 MySQL wait_timeout）
spring.datasource.hikari.max-lifetime=55000
# 定期保活，减少空闲连接被服务端断开（为 0 表示关闭）
spring.datasource.hikari.keepalive-time=30000
spring.datasource.hikari.connection-test-query=SELECT 1

# MyBatis配置
